<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.6)); }
        50% { opacity: 0.9; filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8)); }
      }
      .animate { animation: pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <!-- 3D cube icon -->
  <g class="animate" transform="translate(150, 25)">
    <!-- Cube bars -->
    <rect x="-25" y="-15" width="12" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-20" y="-10" width="18" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-22" y="-5" width="25" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-18" y="0" width="30" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-20" y="5" width="28" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-22" y="10" width="24" height="4" fill="url(#gold)" rx="1"/>
    <rect x="-25" y="15" width="18" height="4" fill="url(#gold)" rx="1"/>
  </g>
  <!-- VULCAN text -->
  <text x="150" y="80" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#gold)" text-anchor="middle">VULC›N</text>
  <!-- DEFENSE text -->
  <text x="150" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="normal" letter-spacing="4" fill="url(#gold)" text-anchor="middle" opacity="0.9">DEFENSE</text>
</svg>
