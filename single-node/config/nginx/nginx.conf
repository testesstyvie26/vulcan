# Vulcan Defense - Nginx proxy para injetar CSS customizado na tela de login
user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    keepalive_timeout  65;
    server_tokens   off;

    gzip on;

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/wazuh-dashboard.pem;
        ssl_certificate_key /etc/nginx/ssl/wazuh-dashboard-key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Bundles e assets estáticos - SEM sub_filter (evita corromper JS/CSS)
        location ~ ^/([0-9]+/)?(bundles|node_modules|ui|plugins|api)/ {
            proxy_pass https://wazuh.dashboard:5601;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Host wazuh.dashboard;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass https://wazuh.dashboard:5601;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_http_version 1.1;
            proxy_set_header Host wazuh.dashboard;
            proxy_set_header Accept-Encoding "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_temp_file_write_size 256k;

            sub_filter_types text/html;
            sub_filter '</head>' '<link rel="stylesheet" href="/ui/assets/vulcan-login.css"></head>';
            sub_filter 'Wazuh dashboard server is not ready yet' 'Vulcan dashboard server is not ready yet';
            sub_filter 'Wazuh Dashboard' 'Vulcan Defense';
            sub_filter 'Wazuh dashboard' 'Vulcan dashboard';
            sub_filter_once off;
        }
    }
}
