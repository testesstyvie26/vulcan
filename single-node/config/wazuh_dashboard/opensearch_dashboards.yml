server.host: 0.0.0.0
server.port: 5601
opensearch.hosts: https://wazuh.indexer:9200
opensearch.ssl.verificationMode: certificate
opensearch.requestHeadersWhitelist: ["securitytenant","Authorization"]
opensearch_security.multitenancy.enabled: false
opensearch_security.readonly_mode.roles: ["kibana_read_only"]
server.ssl.enabled: true
server.ssl.key: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem"
server.ssl.certificate: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem"
opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-dashboard/certs/root-ca.pem"]

# Tela preta / tema escuro + rota padrão
uiSettings.overrides:
  defaultRoute: /app/wz-home
  "theme:darkMode": true

# Login page - Vulcan Defense (título e logo)
opensearch_security.ui.basicauth.login.title: "VULCAN DEFENSE"
opensearch_security.ui.basicauth.login.brandimage: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
opensearch_security.ui.basicauth.login.showbrandimage: true

# Vulcan Defense custom branding (loading, header, favicon)
opensearchDashboards.branding:
  applicationTitle: "Vulcan Defense"
  faviconUrl: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
  loadingLogo:
    defaultUrl: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
    darkModeUrl: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
  mark:
    defaultUrl: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
    darkModeUrl: "/plugins/wazuh/assets/custom/images/vulcan-logo.png"
# Session expiration settings
opensearch_security.cookie.ttl: 900000
opensearch_security.session.ttl: 900000
opensearch_security.session.keepalive: true
